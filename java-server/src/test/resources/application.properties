# The FX refresher fires at startup; disable it in tests so no integration test makes a live Yahoo FX call.
dracul.marketdata.fx-refresh.enabled=false

# T1.6: the 8 memory-reading agents now carry a "search" mcp ToolBinding, which trips
# GenericAgentRegistrar#checkMcpTokenConfigured()'s fail-fast on ApplicationReadyEvent if this is
# blank. A non-blank test-only value keeps every @SpringBootTest that boots these agents (e.g.
# AgentRegistrationParityTest, SharedMcpEntryTest) from aborting context startup.
dracul.hivemem.agent-read-token=test-agent-read-token

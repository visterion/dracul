spring:
  datasource:
    url:      ${DRACUL_DB_URL:jdbc:postgresql://localhost:5432/dracul}
    username: ${DRACUL_DB_USER:dracul}
    password: ${DRACUL_DB_PASSWORD:dracul}
  flyway:
    enabled: true
    locations: classpath:db/migration

dracul:
  public-url: ${DRACUL_PUBLIC_URL:http://localhost:8080}
  cors:
    # Browser origin(s) allowed to call /api/** (comma-separated). Must be the public
    # SPA origin in prod (e.g. https://dracul.ufelmann.com), NOT public-url (internal).
    allowed-origins: ${DRACUL_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  local-access:
    # Opt-in Cloudflare-bypass for direct (non-CF) access. OFF unless BOTH are set:
    # enabled=true AND a non-blank token. See documentation/operations.md.
    enabled: ${DRACUL_LOCAL_ACCESS_ENABLED:false}
    token: ${DRACUL_LOCAL_ACCESS_TOKEN:}
  edgar:
    user-agent: ${DRACUL_EDGAR_USER_AGENT:dracul-research/1.0 contact@example.com}
  strigoi:
    insider:
      enabled: ${STRIGOI_INSIDER_ENABLED:false}
      webhook-token: ${STRIGOI_INSIDER_TOKEN:dev-token-change-me}
      schedule: ${DRACUL_INSIDER_SCHEDULE:0 0 21 * * 1-5}
    echo:
      enabled: ${STRIGOI_ECHO_ENABLED:false}
      webhook-token: ${STRIGOI_ECHO_TOKEN:dev-token-change-me}
      schedule: ${DRACUL_ECHO_SCHEDULE:0 0 22 * * 1-5}
      min-surprise-percent: ${ECHO_MIN_SURPRISE:5.0}
      min-price: ${ECHO_MIN_PRICE:5.0}
      earnings-source: ${ECHO_EARNINGS_SOURCE:finnhub}
    spin:
      enabled: ${STRIGOI_SPIN_ENABLED:false}
      webhook-token: ${STRIGOI_SPIN_TOKEN:dev-token-change-me}
      schedule: ${DRACUL_SPIN_SCHEDULE:0 0 4 * * 1-5}
      lookback-days: ${SPIN_LOOKBACK_DAYS:60}
    lazarus:
      enabled: ${STRIGOI_LAZARUS_ENABLED:false}
      webhook-token: ${STRIGOI_LAZARUS_TOKEN:dev-token-change-me}
      schedule: ${DRACUL_LAZARUS_SCHEDULE:0 0 6 * * 1-5}
      max-above-low: ${LAZARUS_MAX_ABOVE_LOW:0.10}
      max-debt-equity: ${LAZARUS_MAX_DEBT_EQUITY:3.0}
    merger:
      enabled: ${STRIGOI_MERGER_ENABLED:false}
      webhook-token: ${STRIGOI_MERGER_TOKEN:dev-token-change-me}
      schedule: ${DRACUL_MERGER_SCHEDULE:0 0 5 * * 1-5}
      lookback-days: ${MERGER_LOOKBACK_DAYS:45}
    index:
      enabled: ${STRIGOI_INDEX_ENABLED:false}
      webhook-token: ${STRIGOI_INDEX_TOKEN:dev-token-change-me}
      schedule: ${DRACUL_INDEX_SCHEDULE:0 0 7 * * 1-5}
      lookback-days: ${INDEX_LOOKBACK_DAYS:30}
  voievod:
    enabled: ${DRACUL_VOIEVOD_ENABLED:false}
    webhook-token: ${DRACUL_VOIEVOD_TOKEN:dev-token-change-me}
    schedule: ${DRACUL_VOIEVOD_SCHEDULE:0 0 8 * * 1-5}
  gropar:
    enabled: ${DRACUL_GROPAR_ENABLED:false}
    webhook-token: ${DRACUL_GROPAR_WEBHOOK_TOKEN:dev-token-change-me}
    schedule: ${DRACUL_GROPAR_SCHEDULE:0 0 22 * * 1-5}
    history-days: ${DRACUL_GROPAR_HISTORY_DAYS:260}
    atr-period: ${DRACUL_GROPAR_ATR_PERIOD:22}
    atr-multiple: ${DRACUL_GROPAR_ATR_MULTIPLE:3.0}
    ma-fast: ${DRACUL_GROPAR_MA_FAST:50}
    ma-slow: ${DRACUL_GROPAR_MA_SLOW:200}
    profit-target-pct: ${DRACUL_GROPAR_PROFIT_TARGET_PCT:40}
    stop-loss-pct: ${DRACUL_GROPAR_STOP_LOSS_PCT:15}
  daywalker:
    enabled: ${DRACUL_DAYWALKER_ENABLED:false}
    webhook-token: ${DRACUL_DAYWALKER_TOKEN:dev-token-change-me}
    session-cron: ${DRACUL_DAYWALKER_SESSION_CRON:0 30 13 * * 1-5}
    session-duration: ${DRACUL_DAYWALKER_SESSION_DURATION:23400}
    poll-interval: ${DRACUL_DAYWALKER_POLL_INTERVAL:300}
    price-spike-threshold: ${DRACUL_DAYWALKER_PRICE_SPIKE:0.03}
    volume-spike-multiplier: ${DRACUL_DAYWALKER_VOLUME_MULT:3.0}
    cooldown: ${DRACUL_DAYWALKER_COOLDOWN:3600}
    notify-level: ${DRACUL_DAYWALKER_NOTIFY_LEVEL:CRITICAL}
  watchlist:
    price-refresh:
      enabled: ${DRACUL_WATCHLIST_PRICE_REFRESH_ENABLED:true}
      cron:    ${DRACUL_WATCHLIST_PRICE_REFRESH_CRON:0 * 13-20 * * MON-FRI}
  report:
    morning:
      enabled: ${DRACUL_REPORT_MORNING_ENABLED:false}
      cron:    ${DRACUL_REPORT_MORNING_CRON:0 0 7 * * 1-5}
  stopguard:
    enabled:      ${DRACUL_STOPGUARD_ENABLED:false}
    cron:         ${DRACUL_STOPGUARD_CRON:0 */15 9-16 * * 1-5}
    atr-multiple: ${DRACUL_STOPGUARD_ATR_MULTIPLE:0.5}
    cooldown:     ${DRACUL_STOPGUARD_COOLDOWN:82800}
    notify-level: ${DRACUL_STOPGUARD_NOTIFY_LEVEL:WARNING}
  finnhub:
    api-key: ${FINNHUB_API_KEY:}
    base-url: ${FINNHUB_BASE_URL:https://finnhub.io/api/v1}
  wikipedia:
    base-url: ${WIKIPEDIA_BASE_URL:https://en.wikipedia.org}
    user-agent: ${WIKIPEDIA_USER_AGENT:Dracul/1.0 (research; contact via repo)}
    sp500-page: ${WIKIPEDIA_SP500_PAGE:List of S&P 500 companies}
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}
    base-url: ${TELEGRAM_BASE_URL:https://api.telegram.org}
  vistierie:
    url: ${VISTIERIE_URL:http://vistierie:8090}
    tenant-token: ${VISTIERIE_TENANT_TOKEN:}
    admin-token: ${VISTIERIE_ADMIN_TOKEN:}
    # TTL for the aggregated /api/vistierie cost panel. The aggregation fans out
    # ~15 Vistierie calls across virtual threads; this short cache spares repeat
    # loads. Set to 0 to disable caching.
    cache-ttl-seconds: ${VISTIERIE_CACHE_TTL_SECONDS:30}
    monthly-budget-usd: 5.00
    tiers:
      - name: Reasoning
        models: "Sonnet, Opus"
        budget-usd: 2.00
      - name: Routine
        models: "Haiku"
        budget-usd: 1.00
      - name: Local
        models: "Ollama"
        budget-usd: 0.00

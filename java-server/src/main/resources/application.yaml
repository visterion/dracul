spring:
  datasource:
    url:      ${DRACUL_DB_URL:jdbc:postgresql://localhost:5432/dracul}
    username: ${DRACUL_DB_USER:dracul}
    password: ${DRACUL_DB_PASSWORD:dracul}
  flyway:
    enabled: true
    locations: classpath:db/migration

dracul:
  public-url: ${DRACUL_PUBLIC_URL:http://localhost:8080}
  cors:
    # Browser origin(s) allowed to call /api/** (comma-separated). Must be the public
    # SPA origin in prod (e.g. https://dracul.ufelmann.com), NOT public-url (internal).
    allowed-origins: ${DRACUL_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  local-access:
    # Opt-in Cloudflare-bypass for direct (non-CF) access. OFF unless BOTH are set:
    # enabled=true AND a non-blank token. See documentation/operations.md.
    enabled: ${DRACUL_LOCAL_ACCESS_ENABLED:false}
    token: ${DRACUL_LOCAL_ACCESS_TOKEN:}
  agora:
    base-url: ${DRACUL_AGORA_BASE_URL:http://agora:8080}
    token: ${DRACUL_AGORA_TOKEN:}
    timeout-ms: ${DRACUL_AGORA_TIMEOUT_MS:8000}
  hivemem:
    base-url: ${DRACUL_HIVEMEM_BASE_URL:http://hivemem:8421}
    mcp-token: ${DRACUL_HIVEMEM_MCP_TOKEN:}
    agent-read-token: ${DRACUL_HIVEMEM_AGENT_READ_TOKEN:}
    timeout-ms: ${DRACUL_HIVEMEM_TIMEOUT_MS:8000}
  news:
    # Trigger-path social filter (T1.1b): when false (default), get_company_news is called
    # with sourceTypes ["news"] and sourceType=social items are additionally filtered
    # client-side at the AgoraCompanyData chokepoint (covers NewsDetector + ConfounderScreen).
    # The depot instrument bundle (DepotInstrumentService) deliberately bypasses this filter.
    include-social: ${DRACUL_NEWS_INCLUDE_SOCIAL:false}
    # T1.4 credibility scoring — static operator table applied at the AgoraCompanyData
    # chokepoint AFTER the social filter and the dateless drop. Matching is EXACT and
    # case-insensitive against BOTH the item's url domain and its source string; if both
    # hit, min(domainScore, sourceScore) wins (a reddit link-post must never inherit
    # wire-grade credibility from the linked domain). First hit wins in list order.
    # score < drop-below => item is hard-dropped (one INFO summary line per call);
    # score == drop-below passes. Unknown source/domain => default-score. An empty
    # table scores everything default-score and drops nothing — the table is the switch.
    # default-score must be >= drop-below (enforced at startup by NewsCredibilityProperties):
    # otherwise every unknown source would be silently hard-dropped.
    # Reddit rows sit below drop-below on purpose: reddit items drop even under
    # include-social=true. An operator opting reddit in must raise ALL reddit rows
    # (old.reddit.com, reddit.com, reddit-stocks, reddit-wallstreetbets) — matching is
    # exact, and which row fires depends on the item-link host (live-verified as
    # old.reddit.com; reddit.com kept for www/new-reddit link variants) vs. the feed id.
    # Finnhub (the primary provider) proxies every item's url through
    # finnhub.io/api/news?id=... (live-verified, 247/247) — the url domain is therefore
    # useless for Finnhub items. Do NOT add a finnhub.io row: it would collapse every
    # Finnhub item onto one score. Instead the source string carries the real publisher
    # as a display name, so the source rows below are the actual discriminator for
    # Finnhub-sourced news. The original sample contained Yahoo/Benzinga/CNBC/SeekingAlpha/
    # ChartMill; Reuters/Bloomberg/WSJ/MarketWatch were added for known Finnhub source values
    # observed beyond the initial sample.
    credibility:
      default-score: 0.5
      drop-below: 0.3
      sources:
        - { match: "reuters.com", score: 0.9 }
        - { match: "bloomberg.com", score: 0.9 }
        - { match: "wsj.com", score: 0.85 }
        - { match: "ft.com", score: 0.85 }
        - { match: "cnbc.com", score: 0.7 }
        - { match: "marketwatch.com", score: 0.65 }
        - { match: "finance.yahoo.com", score: 0.6 }
        - { match: "seekingalpha.com", score: 0.5 }
        - { match: "benzinga.com", score: 0.45 }
        - { match: "globenewswire.com", score: 0.4 }
        - { match: "prnewswire.com", score: 0.4 }
        - { match: "businesswire.com", score: 0.4 }
        - { match: "reddit.com", score: 0.2 }
        - { match: "old.reddit.com", score: 0.2 }
        - { match: "reddit-stocks", score: 0.2 }
        - { match: "reddit-wallstreetbets", score: 0.2 }
        - { match: "Yahoo", score: 0.6 }
        - { match: "Benzinga", score: 0.45 }
        - { match: "CNBC", score: 0.7 }
        - { match: "SeekingAlpha", score: 0.5 }
        - { match: "ChartMill", score: 0.45 }
        - { match: "Reuters", score: 0.9 }
        - { match: "Bloomberg", score: 0.9 }
        - { match: "WSJ", score: 0.85 }
        - { match: "MarketWatch", score: 0.65 }
  strigoi:
    insider:
      enabled: ${STRIGOI_INSIDER_ENABLED:false}
      webhook-token: ${STRIGOI_INSIDER_TOKEN:dev-token-change-me}
      schedule: ${DRACUL_INSIDER_SCHEDULE:0 0 21 * * 1-5}
    echo:
      enabled: ${STRIGOI_ECHO_ENABLED:false}
      webhook-token: ${STRIGOI_ECHO_TOKEN:dev-token-change-me}
      schedule: ${DRACUL_ECHO_SCHEDULE:0 0 22 * * 1-5}
      min-surprise-percent: ${ECHO_MIN_SURPRISE:5.0}
      min-price: ${ECHO_MIN_PRICE:5.0}
      ohlc-history-days: ${ECHO_OHLC_HISTORY_DAYS:320}
      recent-news-cap: ${ECHO_RECENT_NEWS_CAP:10}
      car:
        market-proxy: ${ECHO_CAR_PROXY:SPY}
      gate:
        max-accrual-ratio: ${ECHO_MAX_ACCRUAL:0.10}
        min-days-to-next-earnings: ${ECHO_MIN_DAYS_NEXT:10}
    spin:
      enabled: ${STRIGOI_SPIN_ENABLED:false}
      webhook-token: ${STRIGOI_SPIN_TOKEN:dev-token-change-me}
      schedule: ${DRACUL_SPIN_SCHEDULE:0 0 4 * * 1-5}
      lookback-days: ${SPIN_LOOKBACK_DAYS:60}
      # Days a spin-co may sit non-distributed before the reconciler ABANDONs it (audit-kept).
      abandon-after-days: ${SPIN_ABANDON_AFTER_DAYS:180}
      # Forced-selling window (days since distribution) within which a DISTRIBUTED candidate is
      # eligible for prey promotion. Used by E4; declared now so config stays complete.
      promotion-window-days: ${SPIN_PROMOTION_WINDOW_DAYS:90}
    lazarus:
      enabled: ${STRIGOI_LAZARUS_ENABLED:false}
      webhook-token: ${STRIGOI_LAZARUS_TOKEN:dev-token-change-me}
      schedule: ${DRACUL_LAZARUS_SCHEDULE:0 0 6 * * 1-5}
      max-above-low: ${LAZARUS_MAX_ABOVE_LOW:0.10}
      max-debt-equity: ${LAZARUS_MAX_DEBT_EQUITY:3.0}
    merger:
      enabled: ${STRIGOI_MERGER_ENABLED:false}
      webhook-token: ${STRIGOI_MERGER_TOKEN:dev-token-change-me}
      schedule: ${DRACUL_MERGER_SCHEDULE:0 0 5 * * 1-5}
      lookback-days: ${MERGER_LOOKBACK_DAYS:45}
    index:
      enabled: ${STRIGOI_INDEX_ENABLED:false}
      webhook-token: ${STRIGOI_INDEX_TOKEN:dev-token-change-me}
      schedule: ${DRACUL_INDEX_SCHEDULE:0 0 7 * * 1-5}
      lookback-days: ${INDEX_LOOKBACK_DAYS:30}
      # POST -> CLOSED this many days past the effective date (run-up/reversal
      # observation window). Pure calendar; see IndexLifecycleReconciler.
      observation-window-days: ${INDEX_OBSERVATION_WINDOW_DAYS:30}
      # Safety-valve: ANNOUNCED -> ABANDONED once an announcement has sat this many
      # days with its effective date still in the future (source data anomaly, not the
      # normal ANNOUNCED -> EFFECTIVE path). No cancellation-signal logic in v1.
      abandon-after-days: ${INDEX_ABANDON_AFTER_DAYS:45}
      # Promotion window (days-to-effective) within which an ANNOUNCED event is eligible for prey
      # promotion, chosen per source: S&P's forced-buy window is a few trading days; Russell's
      # preliminary->final reconstitution is weeks. Only the open, pre-effective window promotes
      # (StrigoiIndexWebhookController.withinAnnouncedWindow); EFFECTIVE/POST never do.
      promotion-window-days-sp: ${INDEX_PROMOTION_WINDOW_DAYS_SP:5}
      promotion-window-days-russell: ${INDEX_PROMOTION_WINDOW_DAYS_RUSSELL:20}
      # --- ANNOUNCED-stage demand snapshot (IndexDemandSnapshotter) ---
      # Market proxy for the idiosyncratic-vol residual regression (shared echo residual machinery).
      market-proxy: ${INDEX_MARKET_PROXY:SPY}
      # Idiosyncratic vol = stddev of the last N daily residuals (stock - beta*market).
      idio-vol-lookback-days: ${INDEX_IDIO_VOL_LOOKBACK_DAYS:90}
      # COARSE per-index constants (NOT feeds) driving demandToAdvRatioEstimate: assets tracking the
      # index (USD billions) and the index's total market cap (USD billions). Rough magnitudes only;
      # every value the estimate produces is proxy/estimate-labelled and judged qualitatively.
      passive-aum-sp500-billions: ${INDEX_PASSIVE_AUM_SP500_BILLIONS:11500}
      passive-aum-russell1000-billions: ${INDEX_PASSIVE_AUM_RUSSELL1000_BILLIONS:700}
      passive-aum-russell2000-billions: ${INDEX_PASSIVE_AUM_RUSSELL2000_BILLIONS:350}
      index-market-cap-sp500-billions: ${INDEX_MKTCAP_SP500_BILLIONS:50000}
      index-market-cap-russell1000-billions: ${INDEX_MKTCAP_RUSSELL1000_BILLIONS:57000}
      index-market-cap-russell2000-billions: ${INDEX_MKTCAP_RUSSELL2000_BILLIONS:3500}
  voievod:
    enabled: ${DRACUL_VOIEVOD_ENABLED:false}
    webhook-token: ${DRACUL_VOIEVOD_TOKEN:dev-token-change-me}
    schedule: ${DRACUL_VOIEVOD_SCHEDULE:0 0 8 * * 1-5}
  voievod-outcome:
    enabled: ${DRACUL_VOIEVOD_OUTCOME_ENABLED:false}
    webhook-token: ${DRACUL_VOIEVOD_OUTCOME_TOKEN:dev-token-change-me}
    schedule: ${DRACUL_VOIEVOD_OUTCOME_SCHEDULE:0 0 7 * * 6}
  gropar:
    enabled: ${DRACUL_GROPAR_ENABLED:false}
    webhook-token: ${DRACUL_GROPAR_WEBHOOK_TOKEN:dev-token-change-me}
    schedule: ${DRACUL_GROPAR_SCHEDULE:0 0 22 * * 1-5}
    history-days: ${DRACUL_GROPAR_HISTORY_DAYS:260}
    atr-period: ${DRACUL_GROPAR_ATR_PERIOD:22}
    atr-multiple: ${DRACUL_GROPAR_ATR_MULTIPLE:3.0}
    ma-fast: ${DRACUL_GROPAR_MA_FAST:50}
    ma-slow: ${DRACUL_GROPAR_MA_SLOW:200}
    profit-target-pct: ${DRACUL_GROPAR_PROFIT_TARGET_PCT:40}
    stop-loss-pct: ${DRACUL_GROPAR_STOP_LOSS_PCT:15}
  executor:
    enabled: ${DRACUL_EXECUTOR_ENABLED:false}
    connection: ${DRACUL_EXECUTOR_CONNECTION:depot-1}
    agora-base-url: ${DRACUL_EXECUTOR_AGORA_BASE_URL:http://agora:8080}
    agora-trading-token: ${DRACUL_EXECUTOR_AGORA_TRADING_TOKEN:}
    agora-timeout-ms: ${DRACUL_EXECUTOR_AGORA_TIMEOUT_MS:8000}
    webhook-token: ${DRACUL_EXECUTOR_WEBHOOK_TOKEN:}
    schedule: ${DRACUL_EXECUTOR_SCHEDULE:}
    min-confidence: ${DRACUL_EXECUTOR_MIN_CONFIDENCE:0.65}
    max-positions: ${DRACUL_EXECUTOR_MAX_POSITIONS:5}
    atr-period: ${DRACUL_EXECUTOR_ATR_PERIOD:22}
    swing-period: ${DRACUL_EXECUTOR_SWING_PERIOD:20}
    rule-version: ${DRACUL_EXECUTOR_RULE_VERSION:exec-v0.4}
    chandelier-mult: ${DRACUL_EXECUTOR_CHANDELIER_MULT:3.0}
    giveback-pct: ${DRACUL_EXECUTOR_GIVEBACK_PCT:0.35}
    giveback-active-from-r: ${DRACUL_EXECUTOR_GIVEBACK_ACTIVE_FROM_R:1.5}
    soft-confirm-min: ${DRACUL_EXECUTOR_SOFT_CONFIRM_MIN:2}
    cooldown-days: ${DRACUL_EXECUTOR_COOLDOWN_DAYS:10}
    pending-exit-stale-hours: ${DRACUL_EXECUTOR_PENDING_EXIT_STALE_HOURS:24}
    total-budget: ${DRACUL_EXECUTOR_TOTAL_BUDGET:10000}
    tranche-count: ${DRACUL_EXECUTOR_TRANCHE_COUNT:10}
    instrument-currency: ${DRACUL_EXECUTOR_INSTRUMENT_CURRENCY:USD}
    heat-pct: ${DRACUL_EXECUTOR_HEAT_PCT:0.06}
    max-per-sector: ${DRACUL_EXECUTOR_MAX_PER_SECTOR:2}
    min-price: ${DRACUL_EXECUTOR_MIN_PRICE:5}
    adv-multiple: ${DRACUL_EXECUTOR_ADV_MULTIPLE:200}
    max-signal-age-days: ${DRACUL_EXECUTOR_MAX_SIGNAL_AGE_DAYS:5}
    chase-atr-mult: ${DRACUL_EXECUTOR_CHASE_ATR_MULT:1.0}
    drift-anchor-atr-mult: ${DRACUL_EXECUTOR_DRIFT_ANCHOR_ATR_MULT:0.0}
    value-anchor-atr-mult: ${DRACUL_EXECUTOR_VALUE_ANCHOR_ATR_MULT:3.0}
    pace-per-week: ${DRACUL_EXECUTOR_PACE_PER_WEEK:2}
    max-tranche: ${DRACUL_EXECUTOR_MAX_TRANCHE:2}
    notify-enabled: ${DRACUL_EXECUTOR_NOTIFY_ENABLED:true}
  depots:
    agora-base-url: ${DRACUL_DEPOTS_AGORA_BASE_URL:http://agora:8080}
    agora-readonly-token: ${DRACUL_DEPOTS_AGORA_READONLY_TOKEN:}
    agora-timeout-ms: ${DRACUL_DEPOTS_AGORA_TIMEOUT_MS:8000}
    live-visible-emails: ${DRACUL_DEPOTS_LIVE_VISIBLE_EMAILS:viktor@ufelmann.de}
    cache-ttl-seconds: ${DRACUL_DEPOTS_CACHE_TTL_SECONDS:60}
    history-lookback-days: ${DRACUL_DEPOTS_HISTORY_LOOKBACK_DAYS:90}
  position:
    enabled: ${DRACUL_POSITION_ENABLED:true}
    connection: ${DRACUL_POSITION_CONNECTION:depot-1}
    reconcile-cron: ${DRACUL_POSITION_RECONCILE_CRON:0 0 12 * * *}
  outcome:
    enabled: ${DRACUL_OUTCOME_ENABLED:true}
    cron: ${DRACUL_OUTCOME_CRON:0 30 22 * * 2-6}
    # OutcomeMemoryScanJob (T1.6 D9): own periodic scan writing realized-outcome HiveMem cells,
    # independent of OutcomeBatchJob's one-shot completeness bookkeeping above.
    hivemem-scan-cron: ${DRACUL_OUTCOME_HIVEMEM_SCAN_CRON:0 45 22 * * 2-6}
    # Terminal scan-bound: a never-traded research_memory_link older than this (max(horizon)+
    # reentry window) is marked excluded so the unwritten candidate set doesn't grow unboundedly.
    memory-scan-max-age-days: ${DRACUL_OUTCOME_MEMORY_SCAN_MAX_AGE_DAYS:120}
  pattern-scorer:
    enabled: ${DRACUL_PATTERN_SCORER_ENABLED:true}
    # Weekly, one hour before the Saturday voievod-outcome run (default 0 0 7 * * 6).
    cron: ${DRACUL_PATTERN_SCORER_CRON:0 0 6 * * 6}
  daywalker:
    enabled: ${DRACUL_DAYWALKER_ENABLED:false}
    webhook-token: ${DRACUL_DAYWALKER_TOKEN:dev-token-change-me}
    session-cron: ${DRACUL_DAYWALKER_SESSION_CRON:0 0 8 * * 1-5}
    session-duration: ${DRACUL_DAYWALKER_SESSION_DURATION:57600}
    poll-interval: ${DRACUL_DAYWALKER_POLL_INTERVAL:300}
    # Intraday sweep universe: false = depot positions only (default, protects the Claude
    # Max quota); true = legacy depot ∪ full watchlist. Parsed fail-safe (any non-"true"
    # value → false); see DaywalkerEventEngine.parseWatchlistEnabled.
    watchlist-enabled: ${DRACUL_DAYWALKER_WATCHLIST_ENABLED:false}
    poll-budget-ms: ${DRACUL_DAYWALKER_POLL_BUDGET_MS:60000}
    price-spike-threshold: ${DRACUL_DAYWALKER_PRICE_SPIKE:0.03}
    volume-spike-multiplier: ${DRACUL_DAYWALKER_VOLUME_MULT:3.0}
    cooldown: ${DRACUL_DAYWALKER_COOLDOWN:3600}
    notify-level: ${DRACUL_DAYWALKER_NOTIFY_LEVEL:CRITICAL}
    escalation-enabled: ${DRACUL_DAYWALKER_ESCALATION_ENABLED:true}
    escalation-confidence: ${DRACUL_DAYWALKER_ESCALATION_CONFIDENCE:0.6}
    macro-cooldown: ${DRACUL_DAYWALKER_MACRO_COOLDOWN:28800}
    # Task 11 (spec §11): total wall-clock budget for the /events prior_memory pre-fetch
    # across ALL emitted events in one invocation (not per-event) -- bounds a black-holing
    # HiveMem so a multi-event poll never blows the poller timeout.
    prior-memory-budget-ms: ${DRACUL_DAYWALKER_PRIOR_MEMORY_BUDGET_MS:2000}
  daywalker-deep:
    enabled: ${DRACUL_DAYWALKER_DEEP_ENABLED:false}
    webhook-token: ${DRACUL_DAYWALKER_DEEP_TOKEN:dev-token-change-me}
  sector:
    ttl-seconds: ${DRACUL_SECTOR_TTL_SECONDS:86400}
    negative-ttl-seconds: ${DRACUL_SECTOR_NEGATIVE_TTL_SECONDS:3600}
  renfield:
    enabled: ${DRACUL_RENFIELD_ENABLED:false}
    cron: ${DRACUL_RENFIELD_CRON:0 0 12 * * MON-FRI}
    webhook-token: ${DRACUL_RENFIELD_TOKEN:dev-token-change-me}
    max-symbols: ${DRACUL_RENFIELD_MAX_SYMBOLS:30}
    # Task 11 (spec §11): total wall-clock budget for the prior_memory pre-fetch across the
    # WHOLE assembleInput run (not per-symbol) -- bounds a black-holing HiveMem.
    prior-memory-budget-ms: ${DRACUL_RENFIELD_PRIOR_MEMORY_BUDGET_MS:2000}
  watchlist:
    price-refresh:
      enabled: ${DRACUL_WATCHLIST_PRICE_REFRESH_ENABLED:true}
      cron:    ${DRACUL_WATCHLIST_PRICE_REFRESH_CRON:0 * 13-20 * * MON-FRI}
  decision-doc:
    path: ${DRACUL_DECISION_DOC_PATH:}
    max-bytes: ${DRACUL_DECISION_DOC_MAX_BYTES:1048576}
  report:
    morning:
      enabled: ${DRACUL_REPORT_MORNING_ENABLED:false}
      cron:    ${DRACUL_REPORT_MORNING_CRON:0 0 7 * * 1-5}
  stopguard:
    enabled:      ${DRACUL_STOPGUARD_ENABLED:false}
    cron:         ${DRACUL_STOPGUARD_CRON:0 */15 9-16 * * 1-5}
    atr-multiple: ${DRACUL_STOPGUARD_ATR_MULTIPLE:0.5}
    cooldown:     ${DRACUL_STOPGUARD_COOLDOWN:82800}
    notify-level: ${DRACUL_STOPGUARD_NOTIFY_LEVEL:WARNING}
  verdict-killwatch:
    enabled: ${DRACUL_VERDICT_KILLWATCH_ENABLED:true}
    cron:    ${DRACUL_VERDICT_KILLWATCH_CRON:0 30 21 * * 1-5}
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}
    base-url: ${TELEGRAM_BASE_URL:https://api.telegram.org}
  vistierie:
    url: ${VISTIERIE_URL:http://vistierie:8090}
    tenant-token: ${VISTIERIE_TENANT_TOKEN:}
    admin-token: ${VISTIERIE_ADMIN_TOKEN:}
    # TTL for the aggregated /api/vistierie cost panel. The aggregation fans out
    # ~15 Vistierie calls across virtual threads; this short cache spares repeat
    # loads. Set to 0 to disable caching.
    cache-ttl-seconds: ${VISTIERIE_CACHE_TTL_SECONDS:30}
    monthly-budget-usd: 5.00
    tiers:
      - name: Reasoning
        models: "Sonnet, Opus"
        budget-usd: 2.00
      - name: Routine
        models: "Haiku"
        budget-usd: 1.00
      - name: Local
        models: "Ollama"
        budget-usd: 0.00
